<!doctype html>
<html lang="en" data-theme="caramellatte">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="preload" href="/fonts/quran/hafs/nastaleeq/indopak/indopak-nastaleeq-waqf-lazim-v4.2.1.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/quran/uthmanic_hafs/UthmanicHafs1Ver18.woff2" as="font" type="font/woff2" crossorigin />
		<style>
			@font-face {
				font-family: 'IndoPak';
				src: local('AlQuran IndoPak by QuranWBW'),
					url('/fonts/quran/hafs/nastaleeq/indopak/indopak-nastaleeq-waqf-lazim-v4.2.1.woff2') format('woff2');
				font-display: swap;
			}
			@font-face {
				font-family: 'UthmanicHafs';
				src: url('/fonts/quran/uthmanic_hafs/UthmanicHafs1Ver18.woff2') format('woff2'),
					url('/publicMin/UthmanicHafs1Ver18.woff2') format('woff2');
				font-display: block;
			}
			@font-face {
				font-family: 'NotoNaskhArabic';
				src: url('/publicMin/NotoNaskhArabic-Regular.woff2') format('woff2');
				font-display: swap;
			}
		</style>
		<script>
			const saved = localStorage.getItem('theme');
			if (saved) document.documentElement.setAttribute('data-theme', saved);
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
